name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Set up Fyne
      run: |
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev
        go get fyne.io/fyne/v2@latest
        go install fyne.io/tools/cmd/fyne@latest

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3.2.1  

    - name: Test Everything is installed
      run: |
        go version        
        fyne version
        sdkmanager --version

    - name: Build 
      run: | 
        SOURCE_DIR=${{ github.workspace }}/cmd/saatool
        APP_ICON=$SOURCE_DIR/icon.png
        FYNE_METADATA=$SOURCE_DIR/FyneApp.toml
        
        # Extract version and build number from FyneApp.toml
        APP_VERSION=$(grep 'Version = ' $FYNE_METADATA | sed 's/.*Version = "\(.*\)".*/\1/')
        BUILD_NUMBER=$(grep 'Build = ' $FYNE_METADATA | sed 's/.*Build = \(.*\)/\1/')
        APP_ID=$(grep 'ID = ' $FYNE_METADATA | sed 's/.*ID = "\(.*\)".*/\1/')
        APP_NAME=$(grep 'Name = ' $FYNE_METADATA | sed 's/.*Name = "\(.*\)".*/\1/')
        TARGET=android/arm64
        OUTPUT=${{ github.workspace }}/$APP_NAME-$APP_VERSION-$BUILD_NUMBER-arm64.apk
     
        echo "Building $OUTPUT..."
        fyne package --target $TARGET --app-id $APP_ID --source-dir $SOURCE_DIR --name $APP_NAME --icon $APP_ICON --app-build $BUILD_NUMBER --app-version=$APP_VERSION 
        mv $SOURCE_DIR/$APP_NAME.apk $OUTPUT

        TARGET=android/amd64
        OUTPUT=${{ github.workspace }}/$APP_NAME-$APP_VERSION-$BUILD_NUMBER-amd64.apk      

        echo "Building $OUTPUT..."
        fyne package --target $TARGET --app-id $APP_ID --source-dir $SOURCE_DIR --name $APP_NAME --icon $APP_ICON --app-build $BUILD_NUMBER --app-version=$APP_VERSION
        mv $SOURCE_DIR/$APP_NAME.apk $OUTPUT
        
    - name: Commit Changes
      run: |                      
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add {{ github.workspace }}/cmd/saatool/FyneApp.toml
        git commit -m "Update build artifacts [skip ci]" || echo "No changes to commit"
        git push origin HEAD:main

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4.6.2
      with:        
        name: saatool-apks        
        path: |
          ${{ github.workspace }}/*.apk
