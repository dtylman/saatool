name: Build

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Set up Fyne
      run: |
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev
        go get fyne.io/fyne/v2@latest
        go install fyne.io/tools/cmd/fyne@latest

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3.2.1
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;25.1.8937393"  

    - name: Test Everything is installed
      run: |
        go version        
        fyne version
        sdkmanager --version

    - name: Bump version            
      run: |        
        chmod +x ./bump-version.sh
        ./bump-version.sh
        
        # Get the new version for later steps
        NEW_VERSION=$(cat VERSION)
        echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV   
        
        # Get the new version for later steps
        NEW_VERSION=$(cat VERSION)
        echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV  

    - name: Build
      run: |
        chmod +x ./build.sh
        ./build.sh
            
    - name: Commit build number change      
      uses: stefanzweifel/git-auto-commit-action@v6
      with:
        commit_message: "CI: Bump build number [skip ci]"        
        file_pattern: ${{ github.workspace }}/VERSION

    - name: Create Git tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ env.VERSION }}" -m "Release version ${{ env.VERSION }}"
        git push origin "v${{ env.VERSION }}"

    - name: Generate changelog from commits
      id: changelog
      run: |
        # Get the previous tag to generate changelog from
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          echo "No previous tag found, generating changelog from all commits"
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          echo "Generating changelog from $PREVIOUS_TAG to v${{ env.VERSION }}"
          CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi
        
        # Save changelog to file and output
        echo "$CHANGELOG" > changelog.txt
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        body: |
          ## Changes in v${{ env.VERSION }}
          
          ${{ steps.changelog.outputs.CHANGELOG }}
          
          ## Downloads
          - **SAATool CLI (Windows)**: `saatooltool.exe` - Command-line tool for EPUB ↔ SPZ conversion on Windows
          - **SAATool CLI (Linux/macOS)**: `saatooltool` - Command-line tool for EPUB ↔ SPZ conversion on Linux/macOS
          - **Android App (ARM64)**: `SAATool-arm64.apk` - For real Android devices
          - **Android App (x86_64)**: `SAATool-amd64.apk` - For Android emulators
        artifacts: |
          build/saatooltool.exe
          build/saatooltool
          build/SAATool-arm64.apk
          build/SAATool-amd64.apk
        generateReleaseNotes: false