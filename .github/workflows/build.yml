name: Build

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Set up Fyne
      run: |
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev
        go get fyne.io/fyne/v2@latest
        go install fyne.io/tools/cmd/fyne@latest

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3.2.1  

    - name: Test Everything is installed
      run: |
        go version        
        fyne version
        sdkmanager --version

    - name: Bump version            
      run: |        
        chmod +x ./bump-version.sh
        ./bump-version.sh
        
        # Get the new version for later steps
        NEW_VERSION=$(cat VERSION)
        echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV   
        
        # Get the new version for later steps
        NEW_VERSION=$(cat VERSION)
        echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV  

    - name: Build
      run: |
        chmod +x ./build.sh
        ./build.sh
            
    - name: Commit build number change      
      uses: stefanzweifel/git-auto-commit-action@v6
      with:
        commit_message: "CI: Bump build number [skip ci]"        
        file_pattern: ${{ github.workspace }}/VERSION

    - name: Create Git tag
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${VERSION}" -m "Release version ${VERSION}"
        git push origin "v${VERSION}"

    - name: Generate changelog from commits
      id: changelog
      run: |
        # Get the previous tag to generate changelog from
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        VERSION=${{ steps.version.outputs.VERSION }}
        
        if [ -z "$PREVIOUS_TAG" ]; then
          echo "No previous tag found, generating changelog from all commits"
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          echo "Generating changelog from $PREVIOUS_TAG to v$VERSION"
          CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi
        
        # Save changelog to file and output
        echo "$CHANGELOG" > changelog.txt
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          ## Changes in v${{ steps.version.outputs.VERSION }}
          
          ${{ steps.changelog.outputs.CHANGELOG }}
        generateReleaseNotes: false