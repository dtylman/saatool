name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Setup Android SDK Tools
      uses: android-actions/setup-android@v3.2.1  

    - name: Test Golang installed
      run: go version

    - name: Test Android SDK installed
      run: sdkmanager --list
